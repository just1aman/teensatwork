{% extends "base.html" %}
{% block title %}Scan QR - TeensAtWork{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7">
        <h2 class="mb-3">Scan Teen's QR Code</h2>
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <p class="text-muted">Point your camera at the QR code shown by the teen. Your browser will ask for camera permission.</p>

                <div id="reader" style="width: 100%;"></div>
                <div id="status" class="mt-3"></div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script>
    const statusEl = document.getElementById('status');

    function onScanSuccess(decodedText, decodedResult) {
        statusEl.innerHTML = '<div class="alert alert-success">QR detected! Redirecting...</div>';
        html5QrcodeScanner.clear();
        window.location.href = decodedText;
    }

    function onScanFailure(error) {
        // Silent — this fires rapidly while scanning
    }

    const html5QrcodeScanner = new Html5QrcodeScanner(
        "reader",
        { fps: 10, qrbox: { width: 250, height: 250 } },
        false
    );
    html5QrcodeScanner.render(onScanSuccess, onScanFailure);
</script>
{% endblock %}
