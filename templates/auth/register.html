{% extends "base.html" %}
{% block title %}Register - TeensAtWork{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h3 class="card-title text-center mb-4">Create Account</h3>

                <!-- Web Google Sign-Up (hidden in Capacitor app) -->
                <div id="google-signup-web">
                    <a href="{{ url_for('auth.google_login') }}" class="btn btn-outline-dark w-100 mb-3 d-flex align-items-center justify-content-center">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 48 48" class="me-2">
                            <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                            <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                            <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                            <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
                        </svg>
                        Sign up with Google
                    </a>
                </div>

                <!-- Native Google Sign-Up (shown only in Capacitor app) -->
                <div id="google-signup-native" style="display: none;">
                    <button id="nativeGoogleRegBtn" class="btn btn-outline-dark w-100 mb-3 d-flex align-items-center justify-content-center" onclick="nativeGoogleSignUp()">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 48 48" class="me-2">
                            <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                            <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                            <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                            <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
                        </svg>
                        Sign up with Google
                    </button>
                </div>

                <div class="text-center text-muted mb-3">
                    <small>or register with email</small>
                </div>

                <script>
                    if (window.Capacitor && window.Capacitor.isNativePlatform && window.Capacitor.isNativePlatform()) {
                        document.getElementById('google-signup-web').style.display = 'none';
                        document.getElementById('google-signup-native').style.display = 'block';

                        try {
                            const GoogleAuth = window.Capacitor.Plugins.GoogleAuth;
                            GoogleAuth.initialize({
                                clientId: '1013148014915-0m2h5kcmrlr41rl29b3q824l76mfe4f2.apps.googleusercontent.com',
                                scopes: ['profile', 'email'],
                                grantOfflineAccess: true,
                            });
                        } catch(e) {
                            console.log('GoogleAuth init:', e);
                        }
                    }

                    async function nativeGoogleSignUp() {
                        const btn = document.getElementById('nativeGoogleRegBtn');
                        btn.disabled = true;
                        btn.innerHTML = 'Signing up...';
                        try {
                            const GoogleAuth = window.Capacitor.Plugins.GoogleAuth;
                            const result = await GoogleAuth.signIn();
                            const response = await fetch('/login/google/native', {
                                method: 'POST',
                                headers: {'Content-Type': 'application/json'},
                                body: JSON.stringify({
                                    idToken: result.authentication.idToken,
                                    email: result.email,
                                    name: result.name || result.displayName,
                                    id: result.id,
                                }),
                            });
                            const data = await response.json();
                            if (data.success && data.redirect) {
                                window.location.href = data.redirect;
                            } else {
                                alert(data.error || 'Sign-up failed');
                            }
                        } catch (err) {
                            alert('Google Sign-Up failed: ' + (err.message || err));
                        } finally {
                            btn.disabled = false;
                            btn.innerHTML = 'Sign up with Google';
                        }
                    }
                </script>

                <form method="POST">
                    <div class="mb-3">
                        <label for="role" class="form-label">I am a...</label>
                        <select class="form-select" id="role" name="role" required onchange="toggleRoleFields()">
                            <option value="">Select your role</option>
                            <option value="homeowner">Homeowner</option>
                            <option value="teen">Teen</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label for="full_name" class="form-label">Full Name</label>
                        <input type="text" class="form-control" id="full_name" name="full_name" required>
                    </div>
                    <div class="mb-3">
                        <label for="username" class="form-label">Username</label>
                        <input type="text" class="form-control" id="username" name="username" required>
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" class="form-control" id="email" name="email" required>
                    </div>
                    <div class="mb-3">
                        <label for="phone" class="form-label">Phone Number</label>
                        <input type="tel" class="form-control" id="phone" name="phone">
                    </div>

                    <!-- Homeowner fields -->
                    <div id="homeowner-fields" style="display: none;">
                        <div class="mb-3">
                            <label for="address" class="form-label">Home Address</label>
                            <input type="text" class="form-control" id="address" name="address"
                                   placeholder="Your address (visible to assigned teens only)">
                        </div>
                    </div>

                    <!-- Teen fields -->
                    <div id="teen-fields" style="display: none;">
                        <div class="mb-3">
                            <label for="age" class="form-label">Age</label>
                            <input type="number" class="form-control" id="age" name="age" min="13" max="19"
                                   placeholder="Must be 13-19">
                        </div>
                        <div class="mb-3">
                            <label for="parent_name" class="form-label">Parent/Guardian Name</label>
                            <input type="text" class="form-control" id="parent_name" name="parent_name">
                        </div>
                        <div class="mb-3">
                            <label for="parent_phone" class="form-label">Parent/Guardian Phone</label>
                            <input type="tel" class="form-control" id="parent_phone" name="parent_phone">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" class="form-control" id="password" name="password" required
                               minlength="6">
                    </div>
                    <div class="mb-3">
                        <label for="confirm_password" class="form-label">Confirm Password</label>
                        <input type="password" class="form-control" id="confirm_password" name="confirm_password"
                               required>
                    </div>

                    <button type="submit" class="btn btn-primary w-100">Register</button>
                </form>
                <p class="text-center mt-3 mb-0">
                    Already have an account? <a href="{{ url_for('auth.login') }}">Login here</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
function toggleRoleFields() {
    const role = document.getElementById('role').value;
    document.getElementById('homeowner-fields').style.display = role === 'homeowner' ? 'block' : 'none';
    document.getElementById('teen-fields').style.display = role === 'teen' ? 'block' : 'none';
}
</script>
{% endblock %}
