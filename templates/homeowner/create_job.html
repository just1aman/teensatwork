{% extends "base.html" %}
{% block title %}Post a Job - TeensAtWork{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7">
        <h2 class="mb-4">Post a New Job</h2>
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <form method="POST">
                    <div class="mb-3">
                        <label for="title" class="form-label">Job Title</label>
                        <input type="text" class="form-control" id="title" name="title" required
                               placeholder="e.g., Lawn mowing needed this Saturday">
                    </div>
                    <div class="mb-3">
                        <label for="category" class="form-label">Category</label>
                        <select class="form-select" id="category" name="category" required>
                            <option value="">Select a category</option>
                            {% for value, label in categories %}
                            <option value="{{ value }}">{{ label }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="description" class="form-label">Description</label>
                        <textarea class="form-control" id="description" name="description" rows="4" required
                                  placeholder="Describe the job, location details, tools provided, etc."></textarea>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="hourly_rate" class="form-label">Hourly Rate ($)</label>
                            <input type="number" class="form-control" id="hourly_rate" name="hourly_rate"
                                   min="1" step="0.50" required placeholder="15.00"
                                   oninput="updateTotal()">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="estimated_hours" class="form-label">Estimated Hours</label>
                            <input type="number" class="form-control" id="estimated_hours" name="estimated_hours"
                                   min="0.5" step="0.5" required placeholder="2"
                                   oninput="updateTotal()">
                        </div>
                    </div>
                    <div class="alert alert-light border" id="total-display">
                        <strong>Estimated Total: </strong><span id="estimated-total">$0.00</span>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Post Job</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
function updateTotal() {
    const rate = parseFloat(document.getElementById('hourly_rate').value) || 0;
    const hours = parseFloat(document.getElementById('estimated_hours').value) || 0;
    document.getElementById('estimated-total').textContent = '$' + (rate * hours).toFixed(2);
}
</script>
{% endblock %}
