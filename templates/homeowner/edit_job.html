{% extends "base.html" %}
{% block title %}Edit Job - TeensAtWork{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7">
        <h2 class="mb-4">Edit Job</h2>
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <form method="POST">
                    <div class="mb-3">
                        <label for="title" class="form-label">Job Title</label>
                        <input type="text" class="form-control" id="title" name="title" value="{{ job.title }}" required>
                    </div>
                    <div class="mb-3">
                        <label for="category" class="form-label">Category</label>
                        <select class="form-select" id="category" name="category" required>
                            {% for value, label in categories %}
                            <option value="{{ value }}" {% if job.category == value %}selected{% endif %}>{{ label }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="description" class="form-label">Description</label>
                        <textarea class="form-control" id="description" name="description" rows="4" required>{{ job.description }}</textarea>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="hourly_rate" class="form-label">Hourly Rate ($)</label>
                            <input type="number" class="form-control" id="hourly_rate" name="hourly_rate"
                                   min="1" step="0.50" value="{{ job.hourly_rate }}" required oninput="updateTotal()">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="estimated_hours" class="form-label">Estimated Hours</label>
                            <input type="number" class="form-control" id="estimated_hours" name="estimated_hours"
                                   min="0.5" step="0.5" value="{{ job.estimated_hours }}" required oninput="updateTotal()">
                        </div>
                    </div>
                    <div class="alert alert-light border">
                        <strong>Estimated Total: </strong><span id="estimated-total">${{ '%.2f' % job.estimated_total }}</span>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Update Job</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
function updateTotal() {
    const rate = parseFloat(document.getElementById('hourly_rate').value) || 0;
    const hours = parseFloat(document.getElementById('estimated_hours').value) || 0;
    document.getElementById('estimated-total').textContent = '$' + (rate * hours).toFixed(2);
}
</script>
{% endblock %}
